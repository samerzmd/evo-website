<svg viewBox="0 0 250 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EVO">
  <g stroke="currentColor" stroke-width="21">
    <!-- e : near-closed ring with a small mouth on the lower-right -->
    <circle cx="60" cy="60" r="40" stroke-dasharray="214 37.3" transform="rotate(72 60 60)" />
    <!-- e crossbar (merges into the left of the ring) -->
    <path d="M30 60 H84" />
    <!-- v : bold central wedge bridging e and o -->
    <path d="M98 36 L125 93 L152 36" stroke-linejoin="round" stroke-linecap="round" />
    <!-- o : near-closed ring with a tiny gap at the lower-right -->
    <circle cx="190" cy="60" r="40" stroke-dasharray="233 18.3" transform="rotate(102 190 60)" />
  </g>
  <!-- dot cluster inside the o : hollow rings -->
  <g fill="none" stroke="#0cda70" stroke-width="3.4">
    <circle cx="190" cy="42" r="5.4" />
    <circle cx="175" cy="52" r="5.4" />
    <circle cx="205" cy="52" r="5.4" />
    <circle cx="190" cy="60" r="5.4" />
    <circle cx="175" cy="70" r="5.4" />
    <circle cx="205" cy="70" r="5.4" />
    <circle cx="190" cy="78" r="5.4" />
  </g>
</svg>
